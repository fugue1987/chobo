# chobo 看板(无登录页;读侧鉴权全靠 basic-auth)。复用 *.example.com 泛域名证书。
#
# 鉴权分层(关键):
#   * 看板 + 读 API(GET /、/v1/stats/*、GET /v1/events 审计) → basic-auth(共享 CRM 含 five-elements
#     真实 per-end-user 数据,读侧绝不可公网裸奔)。
#   * ingest 仅 POST /v1/events → 豁免 basic-auth,改由 CRM 的 x-chobo-secret 头鉴权,
#     让「不在容器内网」的外部接入方(如 AdopterA)也能经公网上报。GET /v1/events 仍走 basic-auth。
server {
    listen 443 ssl;
    server_name chobo.example.com;

    ssl_certificate     /etc/nginx/cert/example/example.com.pem;
    ssl_certificate_key /etc/nginx/cert/example/example.com.key;

    # ingest:仅 POST 豁免 basic-auth(由 CRM x-chobo-secret 鉴权);GET 审计仍需 basic-auth,
    # 避免公网读到全租户事件。limit_except 对「除 POST 外」的方法施加 basic-auth。
    location = /v1/events {
        limit_except POST {
            auth_basic           "chobo";
            auth_basic_user_file /etc/nginx/.htpasswd.chobo;
        }
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 看板 + 读 API:basic-auth。
    location / {
        auth_basic           "chobo";
        auth_basic_user_file /etc/nginx/.htpasswd.chobo;
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
